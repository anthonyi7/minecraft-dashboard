apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mff

resources:
  # Secure FastAPI dashboard (securestatus.mff-server.com, auth required)
  - pvc.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml

  # Public snapshot (status.mff-server.com, no auth)
  - snapshot-pvc.yaml
  - snapshot-cronjob.yaml
  - public-deployment.yaml
  - public-service.yaml

  # Backups
  - db-backup-cronjob.yaml  # daily SQLite backup to 192.168.1.206

  # Ingresses
  - ingress-status.yaml  # status.mff-server.com → public nginx (no auth)
