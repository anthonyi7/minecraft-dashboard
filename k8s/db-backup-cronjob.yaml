apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: mff
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: worker1
          containers:
          - name: backup
            image: alpine:3.19
            command:
            - /bin/sh
            - -c
            - |
              set -e
              apk add --no-cache openssh-client > /dev/null 2>&1
              mkdir -p ~/.ssh
              cp /secrets/mc_dashboard_key ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
              BACKUP_FILE="minecraft_dashboard_$(date +%Y%m%d).db"
              cp /data/minecraft_dashboard.db /tmp/backup.db
              ssh -o StrictHostKeyChecking=no ubuntu@192.168.1.206 "mkdir -p /home/ubuntu/mc_dashboard_backups"
              scp -o StrictHostKeyChecking=no /tmp/backup.db "ubuntu@192.168.1.206:/home/ubuntu/mc_dashboard_backups/$BACKUP_FILE"
              ssh -o StrictHostKeyChecking=no ubuntu@192.168.1.206 "ls -t /home/ubuntu/mc_dashboard_backups/minecraft_dashboard_*.db | tail -n +8 | xargs -r rm -f"
              echo "Backup complete: $BACKUP_FILE"
            volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: ssh-key
              mountPath: /secrets
              readOnly: true
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "200m"
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: minecraft-dashboard-data
          - name: ssh-key
            secret:
              secretName: minecraft-dashboard-ssh-key
              defaultMode: 0400
